<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        function getfullname(){
           let firstname=document.getElementById('first').value;
           let lastname=document.getElementById('last').value;
           let fullname=firstname.concat(" ",lastname);
            document.getElementById('print_name').innerHTML=fullname;

        }
        function upper() {
            let firstname= document.getElementById('first').value;
            let lastname=document.getElementById('last').value;
            let fullname=firstname.concat(" ",lastname);
            document.getElementById(fullname.toUpperCase('print_name'),"<hr>").innerHTML=fullname;    
        }
    </script>

</head>
<body>
    <div class="container" justify-center>
        <div class="row" mt-4>
            <div class="col">
                <label for="form-label">First Name</label>
                <input type="text"id=first>
            </div>
            <div class="col">
                <label for="form-label">Last Name</label>
                <input type="text"id=last>
            </div>
            
            
            
        </div>
        <div class="row"mt-4>
            <div class="col">
                <button type="button" class="btn btn-info" onclick="getfullname()">Get full name</button>
            </div>
            <div class="col">
                <button type="button" class="btn btn-info" onclick="upper()">Upper Case</button>
            </div>
            <div class="col">
                <button type="button" class="btn btn-info">Lower Case</button>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <h1>Full name</h1>
                <h1 class="text" id="print_name">ashwin</h1>
            </div>
        </div>
    </div>
    
</body>
</html>
